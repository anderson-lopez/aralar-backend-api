services:
  api:
    build: .
    env_file: .env
    depends_on: [mongo]
    ports: ["8000:8000"]
    volumes: [".:/app"]

  minio:
    image: minio/minio:RELEASE.2025-01-31T20-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Consola web
    volumes:
      - ./.minio:/data
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
